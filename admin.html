<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境データ管理 - 組織環境ナビゲーション</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .actions-bar {
            background-color: var(--card);
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border-top: 3px solid var(--primary);
        }
        .org-header-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--text-main);
            border-left: 6px solid var(--primary);
            border-bottom: 2px solid var(--border);
            padding-left: 0.8rem;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .editor-grid {
            display: grid; 
            grid-template-columns: 1.2fr 1.2fr 2fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr auto; 
            gap: 0.5rem; 
            align-items: center; 
            background-color: #ffffff; 
            padding: 0.75rem 0.5rem; 
            border-bottom: 1px dashed var(--border);
            margin-bottom: 0;
        }
        .editor-grid:nth-child(even) {
            background-color: var(--bg-subtle);
        }
        .editor-grid input {
            padding: 0.45rem; 
            font-size: 0.85rem;
            background-color: #ffffff;
            border: 1px solid #cccccc;
        }
        .editor-grid label {
            font-size: 0.75rem; 
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
            display: block;
            white-space: nowrap;
        }
        .del-btn {
            background: #ffffff;
            color: #cc0000; 
            border: 1px solid #cc0000; 
            padding: 0.25rem 0.5rem; 
            border-radius: 2px; 
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 18px;
            transition: all 0.2s;
        }
        .del-btn:hover {
            background-color: #cc0000;
            color: white;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-bottom: 2rem;
        }
        .pagination button {
            background-color: #ffffff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .pagination button:hover:not(:disabled) {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination span {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="logo-area">
            <h1>環境データ<span>管理</span></h1>
            <p>既存の環境情報を修正、または新しい組織の情報を追加します</p>
        </div>
        <nav class="main-nav">
            <div class="main-nav-inner">
                <a href="index.html">環境検索</a>
                <a href="admin.html" class="active">データ管理</a>
            </div>
        </nav>
    </header>

    <div class="container" style="max-width: 1400px; width: 95%; margin: 0 auto;">
        
        <div class="actions-bar">
            <div>
                <select id="orgFilter" style="width: 250px; padding: 0.6rem; color: var(--primary); font-weight: bold;" onchange="currentOrgPage = 1; renderEditor()">
                    <option value="">▼ 全ての組織を表示</option>
                </select>
            </div>
            <div style="flex-grow: 1;"></div>
            <button type="button" class="secondary-btn" onclick="addNewRow()">＋ 新規行を追加</button>
            <button type="button" class="primary-btn" onclick="saveToServer()">保存する (一括更新)</button>
        </div>

        <div id="editorArea">
            <div style="text-align:center; color:var(--text-muted); padding: 4rem; border: 1px solid var(--border); background: var(--card); font-weight: bold;">データを読み込んでいます...</div>
        </div>
    </div>

    <!-- 弹窗提示 -->
    <div id="toast">保存成功。</div>

    <script>
        let currentData = [];
        let currentOrgPage = 1;
        const ORGS_PER_PAGE = 6;

        window.addEventListener('DOMContentLoaded', () => {
            fetch('data.csv?t=' + new Date().getTime(), { cache: 'no-store' })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            currentData = results.data;
                            initFilter();
                            renderEditor();
                        }
                    });
                })
                .catch(error => {
                    console.error('data.csv の読み込みに失敗しました:', error);
                    document.getElementById('editorArea').innerHTML = '<div style="text-align:center; color:red; padding: 2rem;">データの読み込みに失敗しました。</div>';
                });
        });

        function renderEditor() {
            const editorArea = document.getElementById('editorArea');
            editorArea.innerHTML = '';

            if(currentData.length === 0) {
                editorArea.innerHTML = '<div class="card" style="text-align:center; padding:4rem; color:var(--text-muted); font-weight: bold;">データがありません。「新規行を追加」をクリックして開始してください。</div>';
                return;
            }

            const orgMap = new Map();
            currentData.forEach((row, idx) => {
                const org = (row['組織名'] || '').trim();
                let key = org === '' ? '（未設定の組織・新規）' : org;
                if (!orgMap.has(key)) orgMap.set(key, []);
                orgMap.get(key).push({ ...row, originalIndex: idx });
            });

            const sortedOrgs = Array.from(orgMap.keys()).sort((a,b) => {
                if(a === '（未設定の組織・新規）') return -1;
                if(b === '（未設定の組織・新規）') return 1;
                return a.localeCompare(b);
            });

            const filterVal = document.getElementById('orgFilter').value;
            let filteredOrgs = sortedOrgs;

            if (filterVal !== '') {
                filteredOrgs = sortedOrgs.filter(org => org === filterVal || org === '（未設定の組織・新規）');
            }

            const totalPages = Math.ceil(filteredOrgs.length / ORGS_PER_PAGE);
            if (currentOrgPage > totalPages) currentOrgPage = Math.max(1, totalPages);
            if (currentOrgPage < 1) currentOrgPage = 1;

            const startIndex = (currentOrgPage - 1) * ORGS_PER_PAGE;
            const endIndex = Math.min(startIndex + ORGS_PER_PAGE, filteredOrgs.length);
            const orgsToShow = filteredOrgs.slice(startIndex, endIndex);

            orgsToShow.forEach(org => {
                const orgBlock = document.createElement('div');
                orgBlock.className = 'card';
                orgBlock.style.padding = '1.5rem';

                const orgHeader = document.createElement('h2');
                orgHeader.className = 'org-header-title';
                orgHeader.textContent = org;
                orgBlock.appendChild(orgHeader);

                const rows = orgMap.get(org);
                rows.forEach(item => {
                    const idx = item.originalIndex;
                    const itemEditor = document.createElement('div');
                    itemEditor.className = 'editor-grid';
                    itemEditor.innerHTML = `
                        <div>
                            <label>組織名</label>
                            <input type="text" value="${escapeHtml(item['組織名'])}" onchange="updateData(${idx}, '組織名', this.value)">
                        </div>
                        <div>
                            <label>構築環境名</label>
                            <input type="text" value="${escapeHtml(item['構築環境名'])}" onchange="updateData(${idx}, '構築環境名', this.value)">
                        </div>
                        <div>
                            <label>URL</label>
                            <input type="text" value="${escapeHtml(item['URL'])}" onchange="updateData(${idx}, 'URL', this.value)">
                        </div>
                        <div>
                            <label>ログインID</label>
                            <input type="text" value="${escapeHtml(item['ログインID'])}" onchange="updateData(${idx}, 'ログインID', this.value)">
                        </div>
                        <div>
                            <label>パスワード</label>
                            <input type="text" value="${escapeHtml(item['ログインパスワード'])}" onchange="updateData(${idx}, 'ログインパスワード', this.value)">
                        </div>
                        <div>
                            <label>DB名</label>
                            <input type="text" value="${escapeHtml(item['DB名'])}" onchange="updateData(${idx}, 'DB名', this.value)">
                        </div>
                        <div>
                            <label>DBユーザ</label>
                            <input type="text" value="${escapeHtml(item['DBユーザー名'])}" onchange="updateData(${idx}, 'DBユーザー名', this.value)">
                        </div>
                        <div>
                            <label>DB Pwd</label>
                            <input type="text" value="${escapeHtml(item['DBパスワード'])}" onchange="updateData(${idx}, 'DBパスワード', this.value)">
                        </div>
                        <div>
                            <button type="button" class="del-btn" onclick="deleteRow(${idx})" title="削除">削除</button>
                        </div>
                    `;
                    orgBlock.appendChild(itemEditor);
                });

                editorArea.appendChild(orgBlock);
            });

            // 分页
            if (totalPages > 1) {
                const paginationDiv = document.createElement('div');
                paginationDiv.className = 'pagination';
                
                const prevBtn = document.createElement('button');
                prevBtn.textContent = '≪ 前へ';
                prevBtn.onclick = () => changePage(-1);
                if (currentOrgPage === 1) prevBtn.disabled = true;

                const pageSpan = document.createElement('span');
                pageSpan.textContent = `ページ ${currentOrgPage} / ${totalPages}`;

                const nextBtn = document.createElement('button');
                nextBtn.textContent = '次へ ≫';
                nextBtn.onclick = () => changePage(1);
                if (currentOrgPage === totalPages) nextBtn.disabled = true;

                paginationDiv.appendChild(prevBtn);
                paginationDiv.appendChild(pageSpan);
                paginationDiv.appendChild(nextBtn);
                
                editorArea.appendChild(paginationDiv);
            }
        }

        function changePage(direction) {
            currentOrgPage += direction;
            renderEditor();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateData(index, field, value) {
            currentData[index][field] = value;
            if (field === '組織名') {
                initFilter();
            }
        }

        function deleteRow(index) {
            if(confirm("このデータを削除してもよろしいですか？")) {
                currentData.splice(index, 1);
                initFilter();
                renderEditor();
            }
        }

        function addNewRow() {
            const filterVal = document.getElementById('orgFilter').value;
            currentData.unshift({
                '組織名': filterVal || '',
                '構築環境名': '',
                'URL': '',
                'ログインID': '',
                'ログインパスワード': '',
                'DB名': '',
                'DBユーザー名': '',
                'DBパスワード': ''
            });
            
            // 新規追加時は確実に1ページ目に戻す
            currentOrgPage = 1;

            initFilter();
            renderEditor();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initFilter() {
            const orgSelect = document.getElementById('orgFilter');
            const currentSelected = orgSelect.value;
            
            const orgSet = new Set();
            currentData.forEach(item => {
                const val = (item['組織名'] || '').trim();
                if(val !== '') orgSet.add(val);
            });
            
            orgSelect.innerHTML = '<option value="">▼ 全ての組織を表示</option>';
            Array.from(orgSet).sort().forEach(org => {
                const opt = document.createElement('option');
                opt.value = org;
                opt.textContent = org;
                orgSelect.appendChild(opt);
            });
            
            if(Array.from(orgSelect.options).some(o => o.value === currentSelected)) {
                orgSelect.value = currentSelected;
            }
        }

        function saveToServer() {
            const filteredData = currentData.filter(row => {
                return (row['組織名'] || '').trim() !== '' || (row['構築環境名'] || '').trim() !== '' || (row['URL'] || '').trim() !== '';
            });
            
            const fields = ["組織名", "構築環境名", "URL", "ログインID", "ログインパスワード", "DB名", "DBユーザー名", "DBパスワード"];
            const csv = Papa.unparse({
                fields: fields,
                data: filteredData
            }, { quotes: true });
            
            fetch('update_csv.jsp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain; charset=UTF-8'
                },
                body: csv
            })
            .then(res => {
                if (res.ok) {
                    currentData = filteredData;
                    renderEditor();
                    showToast('保存成功。サーバーのデータが一括更新されました。');
                } else {
                    res.text().then(text => alert('サーバーエラー: ' + text));
                }
            })
            .catch(err => {
                console.error(err);
                alert('ネットワークエラー。Tomcatサーバー上で実行されているか確認してください。');
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
